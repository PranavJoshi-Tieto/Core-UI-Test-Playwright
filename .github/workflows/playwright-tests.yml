name: Playwright C# NUnit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'staging'
        type: choice
        options: [ dev, staging, prod ]
      browser:
        description: 'Browser to run tests on'
        required: true
        default: 'chromium'
        type: choice
        options: [ chromium, firefox, edge ]

jobs:
  test:
    name: Run Playwright Tests (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox ]  # Parallel browser matrix

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Setup .NET ──────────────────────────────────────────────────────────
      - name: ⚙️ Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Restore & Build ─────────────────────────────────────────────────────
      - name: 📦 Restore NuGet Packages
        run: dotnet restore

      - name: 🔨 Build Solution
        run: dotnet build --no-restore --configuration Release

      # ── Install Playwright Browsers ─────────────────────────────────────────
      - name: 🌐 Install Playwright Browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI 2>/dev/null || true
          pwsh bin/Release/net8.0/playwright.ps1 install --with-deps ${{ matrix.browser }}

      # ── Run Tests ───────────────────────────────────────────────────────────
      - name: 🧪 Run Tests (${{ matrix.browser }})
        run: |
          ENV=${{ github.event.inputs.environment || 'staging' }}
          dotnet test \
            --no-build \
            --configuration Release \
            --settings ${ENV}.runsettings \
            --logger "trx;LogFileName=results-${{ matrix.browser }}.trx" \
            --results-directory ./test-results \
            -- TestRunParameters.Parameter\(name=\"Browser\",\ value=\"${{ matrix.browser }}\"\)
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0

      # ── Upload Screenshots ───────────────────────────────────────────────────
      - name: 📸 Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          retention-days: 7

      # ── Upload Allure Results ────────────────────────────────────────────────
      - name: 📊 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 7

      # ── Upload TRX Results ───────────────────────────────────────────────────
      - name: 📋 Upload TRX Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # ── Allure Report Job ────────────────────────────────────────────────────────
  allure-report:
    name: 📊 Generate Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download All Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: 📊 Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: 🚀 Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
